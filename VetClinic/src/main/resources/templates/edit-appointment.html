<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Appointment - VetClinic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }
        nav {
            background: #2c7be5; color: white; padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
        }
        nav a { color: white; text-decoration: none; font-weight: 500; }
        nav .brand { font-size: 20px; font-weight: 700; }
        nav .links a { margin-left: 20px; opacity: 0.85; }
        nav .links a:hover { opacity: 1; }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h2 { color: #1a3c5e; margin-bottom: 25px; font-size: 24px; }
        .card {
            background: white; border-radius: 12px;
            padding: 35px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 7px; color: #444; font-weight: 500; font-size: 14px; }
        input, select, textarea {
            width: 100%; padding: 11px 14px; border: 1.5px solid #dde3ec;
            border-radius: 8px; font-size: 15px; transition: border 0.2s; background: #fafbfc;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: #2c7be5; background: white;
        }
        textarea { resize: vertical; min-height: 80px; }
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        .btn-primary {
            background: #2c7be5; color: white; border: none;
            padding: 12px 30px; border-radius: 8px; font-size: 15px;
            cursor: pointer; font-weight: 600; width: 100%; transition: background 0.2s;
        }
        .btn-primary:hover { background: #1a65c8; }
        .btn-cancel {
            display: block; background: #f0f4f8; color: #444;
            padding: 12px 30px; border-radius: 8px; font-size: 15px;
            text-decoration: none; font-weight: 500; text-align: center;
            margin-top: 12px; transition: background 0.2s;
        }
        .btn-cancel:hover { background: #dde3ec; }
        .btn-danger {
            background: #fff0f0; color: #c0392b; border: 1px solid #fcc;
            padding: 12px 30px; border-radius: 8px; font-size: 15px;
            cursor: pointer; font-weight: 500; width: 100%; transition: background 0.2s;
        }
        .btn-danger:hover { background: #fde0e0; }
        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600; margin-left: 10px;
        }
        .status-Scheduled { background: #e3f0ff; color: #2c7be5; }
        .status-Completed { background: #e6f9f0; color: #27ae60; }
        .status-Cancelled { background: #fff0f0; color: #c0392b; }
        .alert-error {
            background: #fff0f0; border: 1px solid #fcc; color: #c0392b;
            padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px;
        }
        .divider { border: none; border-top: 1px solid #eee; margin: 25px 0; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🐾 VetClinic</span>
    <div class="links">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/clients}">Clients</a>
        <a th:href="@{/appointments}">Appointments</a>
        <a th:href="@{/logout}">Logout</a>
    </div>
</nav>

<div class="container">
    <h2>
        Edit Appointment
        <span class="status-badge" th:classappend="'status-' + ${appointment.status}"
              th:text="${appointment.status}"></span>
    </h2>

    <div class="card">
        <div class="alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/appointments/update}" method="post">
            <input type="hidden" name="id" th:value="${appointment.id}">

            <div class="form-group">
                <label for="clientId">Client</label>
                <select id="clientId" name="clientId">
                    <option value="">-- Select Client (optional) --</option>
                    <option th:each="client : ${clients}"
                            th:value="${client.id}"
                            th:selected="${appointment.client != null and appointment.client.id == client.id}"
                            th:text="${client.name + ' (' + client.phone + ')'}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="animalId">Animal *</label>
                <select id="animalId" name="animalId" required>
                    <option value="">-- Select Animal --</option>
                    <option th:each="animal : ${animals}"
                            th:value="${animal.id}"
                            th:selected="${appointment.animal != null and appointment.animal.id == animal.id}"
                            th:text="${animal.name + ' (' + animal.species + ')'}"></option>
                </select>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="date">Date *</label>
                    <input type="date" id="date" name="date"
                           th:value="${appointment.date}" required>
                </div>
                <div class="form-group">
                    <label for="time">Time *</label>
                    <input type="time" id="time" name="time"
                           th:value="${appointment.time}" required>
                </div>
            </div>

            <div class="form-group">
                <label for="reason">Reason for Visit *</label>
                <textarea id="reason" name="reason" required
                          th:text="${appointment.reason}"></textarea>
            </div>

            <button type="submit" class="btn-primary">Save Changes</button>
        </form>

        <hr class="divider">

        <form th:action="@{/appointments/cancel}" method="post"
              onsubmit="return confirm('Are you sure you want to cancel this appointment?')">
            <input type="hidden" name="id" th:value="${appointment.id}">
            <button type="submit" class="btn-danger">Cancel Appointment</button>
        </form>

        <a th:href="@{/appointments}" class="btn-cancel">← Back to Appointments</a>
    </div>
</div>
</body>
</html>
