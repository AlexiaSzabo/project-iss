<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>VetClinic - Add Client</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .topbar { background: #2c7873; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 20px; }
        .topbar h1 { font-size: 18px; }
        .topbar .section { font-size: 16px; font-weight: bold; }
        .layout { display: flex; min-height: calc(100vh - 48px); }
        .sidebar { width: 160px; background: #f0f8ff; border-right: 1px solid #ddd; padding: 16px 10px; display: flex; flex-direction: column; }
        .sidebar a { display: block; padding: 10px 12px; color: #333; text-decoration: none; border-radius: 5px; font-size: 14px; margin-bottom: 4px; transition: background 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: #d4ecf7; color: #2c7873; }
        .sidebar .spacer { flex: 1; }
        .sidebar .logout { display: block; padding: 10px 12px; color: #e74c3c; text-decoration: none; border-radius: 5px; font-size: 14px; }
        .sidebar .logout:hover { background: #fde8e8; }
        .content { flex: 1; padding: 24px; display: flex; justify-content: center; }
        .form-card { background: white; border-radius: 8px; padding: 30px; width: 100%; max-width: 480px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); align-self: flex-start; }
        .form-card h2 { font-size: 20px; color: #222; margin-bottom: 24px; }
        label { display: block; font-size: 13px; color: #444; margin-bottom: 5px; margin-top: 14px; }
        input[type="text"], input[type="email"], input[type="tel"] { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; outline: none; transition: border 0.2s; }
        input:focus { border-color: #2c7873; }
        .error-msg { background: #fde8e8; border: 1px solid #f5c6c6; color: #c0392b; padding: 10px 12px; border-radius: 5px; font-size: 13px; margin-bottom: 16px; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .btn-save { flex: 1; padding: 11px; background: #2c2c2c; color: white; border: none; border-radius: 5px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-save:hover { background: #444; }
        .btn-cancel { flex: 1; padding: 11px; background: white; color: #555; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; cursor: pointer; text-decoration: none; text-align: center; }
        .btn-cancel:hover { background: #f5f5f5; }
    </style>
</head>
<body>
<div class="topbar">
    <h1>VetClinic</h1>
    <span class="section">Add Client</span>
</div>
<div class="layout">
    <div class="sidebar">
        <a href="/dashboard">Dashboard</a>
        <a href="/dashboard">Patients</a>
        <a href="/clients" class="active">Clients</a>
        <a href="/appointments">Appointments</a>
        <div class="spacer"></div>
        <a href="/logout" class="logout">← Logout</a>
    </div>
    <div class="content">
        <div class="form-card">
            <h2>Add Client</h2>

            <div th:if="${error}" class="error-msg" th:text="${error}"></div>

            <form th:action="@{/clients/save}" method="post">
                <!-- RegisterClientSD - msg 5: name = insertName() -->
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Client full name" required>

                <!-- RegisterClientSD - msg 6: phone = insertPhone() -->
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" placeholder="07XXXXXXXX" required>

                <!-- RegisterClientSD - msg 7: email = insertEmail() -->
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="example@email.com">

                <div class="btn-row">
                    <a href="/clients" class="btn-cancel">Cancel</a>
                    <button type="submit" class="btn-save">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
