<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>VetClinic - Medical History</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .topbar { background: #2c7873; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 20px; }
        .topbar h1 { font-size: 18px; }
        .topbar .section { font-size: 16px; font-weight: bold; }
        .layout { display: flex; min-height: calc(100vh - 48px); }
        .sidebar { width: 160px; background: #f0f8ff; border-right: 1px solid #ddd; padding: 16px 10px; display: flex; flex-direction: column; }
        .sidebar a { display: block; padding: 10px 12px; color: #333; text-decoration: none; border-radius: 5px; font-size: 14px; margin-bottom: 4px; }
        .sidebar a:hover { background: #d4ecf7; color: #2c7873; }
        .sidebar .spacer { flex: 1; }
        .sidebar .logout { display: block; padding: 10px 12px; color: #e74c3c; text-decoration: none; border-radius: 5px; font-size: 14px; }
        .content { flex: 1; padding: 24px; }
        .animal-header { background: white; border-radius: 8px; padding: 18px 24px; margin-bottom: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 20px; }
        .animal-header h2 { font-size: 18px; color: #222; }
        .animal-header .meta { font-size: 13px; color: #777; }
        .cons-card { background: white; border-radius: 8px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
        .cons-card .cons-date { font-size: 12px; color: #777; margin-bottom: 8px; }
        .cons-card h3 { font-size: 15px; color: #2c7873; margin-bottom: 12px; }
        .field { margin-bottom: 10px; }
        .field label { font-size: 12px; color: #999; display: block; margin-bottom: 2px; }
        .field p { font-size: 14px; color: #333; }
        .cost { font-size: 15px; font-weight: bold; color: #2c7873; }
        .treatments { margin-top: 14px; border-top: 1px solid #f0f0f0; padding-top: 12px; }
        .treatments h4 { font-size: 13px; color: #555; margin-bottom: 8px; }
        .treatment-item { background: #f8f8f8; border-radius: 5px; padding: 8px 12px; margin-bottom: 6px; font-size: 13px; }
        .treatment-item strong { color: #333; }
        .treatment-item span { color: #777; }
        .btn-treatment { background: #6f42c1; color: white; border: none; padding: 6px 14px; border-radius: 4px; font-size: 12px; cursor: pointer; text-decoration: none; margin-top: 8px; display: inline-block; }
        .btn-treatment:hover { background: #5a32a3; }
        .empty-msg { text-align: center; padding: 40px; color: #999; font-size: 14px; }
        .btn-back { display: inline-block; margin-bottom: 16px; color: #2c7873; font-size: 14px; text-decoration: none; }
        .btn-back:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="topbar">
    <h1>VetClinic</h1>
    <span class="section">Medical History</span>
</div>
<div class="layout">
    <div class="sidebar">
        <a href="/dashboard">Dashboard</a>
        <a href="/dashboard">Patients</a>
        <a href="/clients">Clients</a>
        <a href="/appointments">Appointments</a>
        <div class="spacer"></div>
        <a href="/logout" class="logout">← Logout</a>
    </div>
    <div class="content">
        <a href="/appointments" class="btn-back">← Back to Appointments</a>

        <div class="animal-header">
            <div>
                <h2 th:text="${animal.name}">Animal Name</h2>
                <p class="meta">
                    <span th:text="${animal.species}">-</span>
                    <span th:if="${animal.breed != null and animal.breed != ''}"> · <span th:text="${animal.breed}"></span></span>
                    · Age: <span th:text="${animal.age}">-</span>
                    <span th:if="${animal.client != null}"> · Owner: <strong th:text="${animal.client.name}"></strong></span>
                </p>
            </div>
        </div>

        <div th:if="${consultations.isEmpty()}" class="empty-msg">
            No consultations recorded yet for this animal.
        </div>

        <div th:each="cons : ${consultations}" class="cons-card">
            <div class="cons-date" th:text="${cons.date}">-</div>
            <h3>Consultation #<span th:text="${cons.id}"></span></h3>

            <div class="field">
                <label>Symptoms</label>
                <p th:text="${cons.symptoms}">-</p>
            </div>
            <div class="field">
                <label>Diagnosis</label>
                <p th:text="${cons.diagnosis}">-</p>
            </div>
            <div class="field" th:if="${cons.recommendations != null and cons.recommendations != ''}">
                <label>Recommendations</label>
                <p th:text="${cons.recommendations}">-</p>
            </div>
            <div class="field">
                <label>Cost</label>
                <p class="cost" th:text="${cons.cost + ' RON'}">-</p>
            </div>

            <div class="treatments">
                <h4>Treatments</h4>
                <div th:if="${cons.treatments == null or cons.treatments.isEmpty()}" style="font-size:13px;color:#999;">
                    No treatments added yet.
                </div>
                <div th:each="t : ${cons.treatments}" class="treatment-item">
                    <strong th:text="${t.name}">-</strong>
                    <span th:if="${t.dosage != null and t.dosage != ''}"> · Dosage: <span th:text="${t.dosage}"></span></span>
                    <span th:if="${t.duration != null and t.duration != ''}"> · Duration: <span th:text="${t.duration}"></span></span>
                    <span th:if="${t.description != null and t.description != ''}"><br><span th:text="${t.description}" style="color:#555;"></span></span>
                </div>
                <a th:href="@{/treatments/add(consultationId=${cons.id})}" class="btn-treatment">+ Add Treatment</a>
            </div>
        </div>

    </div>
</div>
</body>
</html>
