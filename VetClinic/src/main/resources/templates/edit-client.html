<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Client - VetClinic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .topbar { background: #2c7873; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 20px; }
        .topbar h1 { font-size: 18px; }
        .topbar .section { font-size: 16px; font-weight: bold; }
        .layout { display: flex; min-height: calc(100vh - 48px); }
        .sidebar { width: 160px; background: #f0f8ff; border-right: 1px solid #ddd; padding: 16px 10px; display: flex; flex-direction: column; }
        .sidebar a { display: block; padding: 10px 12px; color: #333; text-decoration: none; border-radius: 5px; font-size: 14px; margin-bottom: 4px; transition: background 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: #d4ecf7; color: #2c7873; }
        .sidebar .spacer { flex: 1; }
        .sidebar .logout { color: #e74c3c; }
        .sidebar .logout:hover { background: #fde8e8; }
        .content { flex: 1; padding: 24px; }
        .card { background: white; border-radius: 8px; padding: 28px; max-width: 500px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
        h2 { font-size: 20px; color: #222; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #555; font-weight: bold; }
        input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; background: #fafafa; }
        input:focus { outline: none; border-color: #2c7873; background: white; }
        .btn-save { background: #2c7873; color: white; border: none; padding: 10px 24px; border-radius: 5px; font-size: 14px; cursor: pointer; font-weight: bold; }
        .btn-save:hover { background: #225f5a; }
        .btn-back { background: #f0f0f0; color: #333; border: none; padding: 10px 24px; border-radius: 5px; font-size: 14px; cursor: pointer; text-decoration: none; margin-left: 10px; }
        .btn-back:hover { background: #e0e0e0; }
        .alert-error { background: #fde8e8; border: 1px solid #f5c6cb; color: #721c24; padding: 10px 14px; border-radius: 5px; margin-bottom: 16px; font-size: 13px; }
    </style>
</head>
<body>
<div class="topbar">
    <h1>VetClinic</h1>
    <span class="section">Edit Client</span>
</div>
<div class="layout">
    <div class="sidebar">
        <a href="/dashboard">Patients</a>
        <a href="/clients" class="active">Clients</a>
        <a href="/appointments">Appointments</a>
        <div class="spacer"></div>
        <a href="/logout" class="logout">← Logout</a>
    </div>
    <div class="content">
        <div class="card">
            <h2>Edit Client</h2>
            <div class="alert-error" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/clients/update}" method="post">
                <input type="hidden" name="id" th:value="${client.id}">

                <div class="form-group">
                    <label>Name *</label>
                    <input type="text" name="name" th:value="${client.name}" required>
                </div>

                <div class="form-group">
                    <label>Phone *</label>
                    <input type="text" name="phone" th:value="${client.phone}" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" th:value="${client.email}">
                </div>

                <button type="submit" class="btn-save">Save Changes</button>
                <a href="/clients" class="btn-back">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
