<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>VetClinic - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background-color: #cde8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .page-wrapper {
            display: flex;
            align-items: center;
            gap: 60px;
        }

        .branding {
            text-align: center;
            color: #2c7873;
        }

        .branding .paw { font-size: 80px; }

        .branding h1 {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }

        .branding p {
            font-size: 14px;
            color: #555;
            margin-top: 6px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 35px 30px;
            width: 320px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #222;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #444;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 13px;
            margin-bottom: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: #2c7873; }

        .forgot {
            display: block;
            font-size: 12px;
            color: #2c7873;
            text-decoration: none;
            margin-bottom: 18px;
        }

        .btn-login {
            width: 100%;
            padding: 11px;
            background-color: #2c2c2c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-login:hover { background-color: #444; }

        .error-msg {
            background-color: #fde8e8;
            border: 1px solid #f5c6c6;
            color: #c0392b;
            padding: 10px 12px;
            border-radius: 5px;
            font-size: 13px;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>
<div class="page-wrapper">
    <div class="branding">
        <div class="paw">🐾</div>
        <h1>Welcome to<br>VetClinic</h1>
        <p>Veterinary Clinic<br>Management System</p>
    </div>

    <div class="card">
        <h2>Register</h2>

        <div th:if="${error}" class="error-msg" th:text="${error}"></div>

        <form th:action="@{/login}" method="post">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••••••" required>

            <a href="#" class="forgot">Forgot Password?</a>

            <button type="submit" class="btn-login">Login</button>
        </form>
    </div>
</div>
</body>
</html>
