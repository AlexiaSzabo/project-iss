<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>VetClinic - Add Veterinarian</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .topbar { background: #2c7873; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 20px; }
        .topbar h1 { font-size: 18px; }
        .topbar .section { font-size: 16px; font-weight: bold; }
        .layout { display: flex; min-height: calc(100vh - 48px); }
        .sidebar { width: 160px; background: #f0f8ff; border-right: 1px solid #ddd; padding: 16px 10px; display: flex; flex-direction: column; }
        .sidebar a { display: block; padding: 10px 12px; color: #333; text-decoration: none; border-radius: 5px; font-size: 14px; margin-bottom: 4px; }
        .sidebar a:hover, .sidebar a.active { background: #d4ecf7; color: #2c7873; }
        .sidebar .spacer { flex: 1; }
        .sidebar .logout { display: block; padding: 10px 12px; color: #e74c3c; text-decoration: none; border-radius: 5px; font-size: 14px; }
        .content { flex: 1; padding: 24px; }
        .card { background: white; border-radius: 8px; padding: 28px; max-width: 500px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
        .card h2 { font-size: 18px; margin-bottom: 20px; color: #222; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 14px; }
        input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        input:focus { outline: none; border-color: #2c7873; }
        .btn-save { background: #2c7873; color: white; border: none; padding: 11px 28px; border-radius: 5px; font-size: 14px; cursor: pointer; margin-top: 20px; }
        .btn-save:hover { background: #225f5a; }
        .btn-back { background: #aaa; color: white; border: none; padding: 11px 20px; border-radius: 5px; font-size: 14px; cursor: pointer; margin-top: 20px; margin-left: 10px; text-decoration: none; }
        .error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; background: #fde8e8; padding: 8px 12px; border-radius: 5px; }
    </style>
</head>
<body>
<div class="topbar">
    <h1>VetClinic</h1>
    <span class="section">Add Veterinarian</span>
</div>
<div class="layout">
    <div class="sidebar">
        <a href="/dashboard">Dashboard</a>
        <a href="/dashboard">Patients</a>
        <a href="/clients">Clients</a>
        <a href="/appointments">Appointments</a>
        <a href="/veterinarians" class="active">Veterinarians</a>
        <a href="/users">Users</a>
        <a href="/reports">Reports</a>
        <div class="spacer"></div>
        <a href="/logout" class="logout">← Logout</a>
    </div>
    <div class="content">
        <div class="card">
            <h2>Add New Veterinarian</h2>

            <p class="error" th:if="${error}" th:text="${error}"></p>

            <form th:action="@{/veterinarians/save}" method="post">
                <label>Full Name *</label>
                <input type="text" name="name" required placeholder="Dr. Ion Popescu">

                <label>Specialization *</label>
                <input type="text" name="specialization" required placeholder="e.g. Surgery, Internal Medicine">

                <label>Phone *</label>
                <input type="text" name="phone" required placeholder="07xx xxx xxx">

                <label>Email *</label>
                <input type="email" name="email" required placeholder="doctor@vetclinic.ro">

                <button type="submit" class="btn-save">Save Veterinarian</button>
                <a href="/veterinarians" class="btn-back">Back</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
