<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>VetClinic - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .topbar {
            background-color: #2c7873;
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .topbar-left { display: flex; align-items: center; gap: 20px; }
        .topbar h1 { font-size: 18px; }
        .topbar .section { font-size: 16px; font-weight: bold; }
        .topbar .user {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .topbar .user span { font-size: 20px; }
        .layout { display: flex; min-height: calc(100vh - 48px); }
        .sidebar {
            width: 160px;
            background: #f0f8ff;
            border-right: 1px solid #ddd;
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
        }
        .sidebar a {
            display: block;
            padding: 10px 12px;
            color: #333;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            margin-bottom: 4px;
            transition: background 0.2s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: #d4ecf7;
            color: #2c7873;
        }
        .sidebar .spacer { flex: 1; }
        .sidebar .logout {
            display: block;
            padding: 10px 12px;
            color: #e74c3c;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            transition: background 0.2s;
        }
        .sidebar .logout:hover { background: #fde8e8; }
        .content { flex: 1; padding: 24px; }
        .content-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .content-header h2 { font-size: 20px; color: #222; }
        .btn-add {
            background-color: #2c7873;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-add:hover { background-color: #225f5a; }
        .stats { display: flex; gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: #2c7873;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            min-width: 160px;
        }
        .stat-card .label { font-size: 12px; opacity: 0.85; }
        .stat-card .number { font-size: 32px; font-weight: bold; margin-top: 4px; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        }
        thead { background: #f0f8ff; }
        th {
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
            color: #555;
            font-weight: bold;
            border-bottom: 1px solid #e0e0e0;
        }
        td {
            padding: 12px 16px;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }
        .empty-msg {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }
        .btn-edit { background: #2c7873; color: white; border: none; padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; text-decoration: none; margin-right: 4px; }
        .btn-edit:hover { background: #225f5a; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .btn-delete:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <h1>VetClinic</h1>
        <span class="section">Patients</span>
    </div>
    <div class="user">
        <span>👤</span>
        <span th:text="${employee.name}">Employee</span>
    </div>
</div>

<div class="layout">
    <div class="sidebar">
        <a href="/dashboard" class="active">Dashboard</a>
        <a href="/dashboard">Patients</a>
        <a href="/clients">Clients</a>
        <a href="/appointments">Appointments</a>
        <a href="/veterinarians">Veterinarians</a>
        <a href="/users">Users</a>
        <a href="/reports">Reports</a>
        <div class="spacer"></div>
        <a href="/logout" class="logout">← Logout</a>
    </div>

    <div class="content">
        <div class="content-header">
            <h2>Patients</h2>
            <a href="/animals/add" class="btn-add">+ Add Animal</a>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="label">Registered Animals</div>
                <div class="number" th:text="${animalCount}">0</div>
            </div>
        </div>

        <table th:if="${!animals.isEmpty()}">
            <thead>
            <tr>
                <th>Name</th>
                <th>Species</th>
                <th>Breed</th>
                <th>Age</th>
                <th>Owner (Client)</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="animal : ${animals}">
                <td th:text="${animal.name}">-</td>
                <td th:text="${animal.species}">-</td>
                <td th:text="${animal.breed != null ? animal.breed : '-'}">-</td>
                <td th:text="${animal.age}">-</td>
                <td th:text="${animal.client != null ? animal.client.name : '— no owner —'}">-</td>
                <td>
                    <a th:href="@{/animals/edit/{id}(id=${animal.id})}" class="btn-edit">Edit</a>
                    <form th:action="@{/animals/delete}" method="post" style="display:inline"
                          onsubmit="return confirm('Delete this animal?')">
                        <input type="hidden" name="id" th:value="${animal.id}">
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${animals.isEmpty()}" class="empty-msg">
            No animals registered yet. Click <strong>+ Add Animal</strong> to add one.
        </div>
    </div>
</div>

</body>
</html>
