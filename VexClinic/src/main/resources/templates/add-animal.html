<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>VetClinic - Add Animal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: Arial, sans-serif; background: #f5f5f5; }

        /* TOP BAR */
        .topbar {
            background-color: #2c7873;
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-left { display: flex; align-items: center; gap: 20px; }
        .topbar h1 { font-size: 18px; }
        .topbar .section { font-size: 16px; font-weight: bold; }
        .topbar .user { font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .topbar .user span { font-size: 20px; }

        /* LAYOUT */
        .layout { display: flex; min-height: calc(100vh - 48px); }

        /* SIDEBAR */
        .sidebar {
            width: 160px;
            background: #f0f8ff;
            border-right: 1px solid #ddd;
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
        }

        .sidebar a {
            display: block;
            padding: 10px 12px;
            color: #333;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            margin-bottom: 4px;
            transition: background 0.2s;
        }

        .sidebar a:hover, .sidebar a.active {
            background: #d4ecf7;
            color: #2c7873;
        }

        .sidebar .spacer { flex: 1; }

        .sidebar .logout {
            display: block;
            padding: 10px 12px;
            color: #e74c3c;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            transition: background 0.2s;
        }

        .sidebar .logout:hover { background: #fde8e8; }

        /* CONTENT */
        .content { flex: 1; padding: 24px; display: flex; justify-content: center; }

        /* FORM CARD */
        .form-card {
            background: white;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08);
            align-self: flex-start;
        }

        .form-card h2 {
            font-size: 20px;
            color: #222;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #444;
            margin-bottom: 5px;
            margin-top: 14px;
        }

        label:first-of-type { margin-top: 0; }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 13px;
            outline: none;
            transition: border 0.2s;
            background: white;
        }

        input:focus, select:focus { border-color: #2c7873; }

        .error-msg {
            background-color: #fde8e8;
            border: 1px solid #f5c6c6;
            color: #c0392b;
            padding: 10px 12px;
            border-radius: 5px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-save {
            flex: 1;
            padding: 11px;
            background-color: #2c2c2c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-save:hover { background-color: #444; }

        .btn-cancel {
            flex: 1;
            padding: 11px;
            background-color: white;
            color: #555;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: background 0.2s;
        }

        .btn-cancel:hover { background-color: #f5f5f5; }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="topbar-left">
        <h1>VetClinic</h1>
        <span class="section">Add Animal</span>
    </div>
    <div class="user">
        <span>👤</span>
    </div>
</div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="/dashboard">Dashboard</a>
        <a href="/dashboard" class="active">Patients</a>
        <a href="#">Appointments</a>
        <a href="#">Veterinarians</a>
        <div class="spacer"></div>
        <a href="/logout" class="logout">← Logout</a>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <div class="form-card">
            <h2>Add Animal</h2>

            <div th:if="${error}" class="error-msg" th:text="${error}"></div>

            <!-- AddAnimalSD - msg 7: clickSave() -> POST /animals/save -->
            <form th:action="@{/animals/save}" method="post">

                <!-- AddAnimalSD - msg 3: name = insertName() -->
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Animal name" required>

                <!-- AddAnimalSD - msg 4: species = insertSpecies() -->
                <label for="species">Species</label>
                <select id="species" name="species" required>
                    <option value="" disabled selected>...</option>
                    <option value="Dog">Dog</option>
                    <option value="Cat">Cat</option>
                    <option value="Bird">Bird</option>
                    <option value="Rabbit">Rabbit</option>
                    <option value="Hamster">Hamster</option>
                    <option value="Fish">Fish</option>
                    <option value="Other">Other</option>
                </select>

                <!-- AddAnimalSD - msg 5: breed = insertBreed() -->
                <label for="breed">Breed</label>
                <input type="text" id="breed" name="breed" placeholder="Breed (optional)">

                <!-- AddAnimalSD - msg 6: age = insertAge() -->
                <label for="age">Age</label>
                <select id="age" name="age" required>
                    <option value="" disabled selected>...</option>
                    <option th:each="i : ${#numbers.sequence(0, 30)}"
                            th:value="${i}"
                            th:text="${i}">0</option>
                </select>

                <div class="btn-row">
                    <a href="/dashboard" class="btn-cancel">Cancel</a>
                    <button type="submit" class="btn-save">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
