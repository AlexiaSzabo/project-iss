<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>VetClinic - Record Consultation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .topbar { background: #2c7873; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 20px; }
        .topbar h1 { font-size: 18px; }
        .topbar .section { font-size: 16px; font-weight: bold; }
        .layout { display: flex; min-height: calc(100vh - 48px); }
        .sidebar { width: 160px; background: #f0f8ff; border-right: 1px solid #ddd; padding: 16px 10px; display: flex; flex-direction: column; }
        .sidebar a { display: block; padding: 10px 12px; color: #333; text-decoration: none; border-radius: 5px; font-size: 14px; margin-bottom: 4px; }
        .sidebar a:hover { background: #d4ecf7; color: #2c7873; }
        .sidebar .spacer { flex: 1; }
        .sidebar .logout { display: block; padding: 10px 12px; color: #e74c3c; text-decoration: none; border-radius: 5px; font-size: 14px; }
        .content { flex: 1; padding: 24px; }
        .card { background: white; border-radius: 8px; padding: 28px; max-width: 600px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
        .card h2 { font-size: 18px; margin-bottom: 6px; color: #222; }
        .appt-info { background: #f0f8ff; border-radius: 6px; padding: 12px 16px; margin-bottom: 20px; font-size: 14px; color: #555; }
        .appt-info strong { color: #2c7873; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 14px; }
        input, textarea { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        textarea { resize: vertical; min-height: 80px; }
        .btn-save { background: #6f42c1; color: white; border: none; padding: 11px 28px; border-radius: 5px; font-size: 14px; cursor: pointer; margin-top: 20px; }
        .btn-save:hover { background: #5a32a3; }
        .btn-back { background: #aaa; color: white; border: none; padding: 11px 20px; border-radius: 5px; font-size: 14px; cursor: pointer; margin-top: 20px; margin-left: 10px; text-decoration: none; }
        .error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="topbar">
    <h1>VetClinic</h1>
    <span class="section">Record Consultation</span>
</div>
<div class="layout">
    <div class="sidebar">
        <a href="/dashboard">Dashboard</a>
        <a href="/dashboard">Patients</a>
        <a href="/clients">Clients</a>
        <a href="/appointments">Appointments</a>
        <div class="spacer"></div>
        <a href="/logout" class="logout">← Logout</a>
    </div>
    <div class="content">
        <div class="card">
            <h2>Record Consultation</h2>

            <div class="appt-info">
                <strong>Animal:</strong> <span th:text="${appointment.animal != null ? appointment.animal.name : '-'}">-</span>
                &nbsp;|&nbsp;
                <strong>Client:</strong> <span th:text="${appointment.client != null ? appointment.client.name : '-'}">-</span>
                &nbsp;|&nbsp;
                <strong>Date:</strong> <span th:text="${appointment.date}">-</span>
                &nbsp;|&nbsp;
                <strong>Reason:</strong> <span th:text="${appointment.reason}">-</span>
            </div>

            <p class="error" th:if="${error}" th:text="${error}"></p>

            <form th:action="@{/consultations/save}" method="post">
                <input type="hidden" name="appointmentId" th:value="${appointment.id}">

                <label>Symptoms *</label>
                <textarea name="symptoms" required placeholder="Describe the symptoms observed..."></textarea>

                <label>Diagnosis *</label>
                <textarea name="diagnosis" required placeholder="Diagnosis..."></textarea>

                <label>Recommendations</label>
                <textarea name="recommendations" placeholder="Recommendations for the owner..."></textarea>

                <label>Consultation Cost (RON) *</label>
                <input type="number" name="cost" step="0.01" min="0" required placeholder="0.00">

                <button type="submit" class="btn-save">Save Consultation</button>
                <a href="/appointments" class="btn-back">Back</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
